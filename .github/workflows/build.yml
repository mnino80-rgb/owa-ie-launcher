name: Build Helper

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: helper
          path: bin/Release/**
